name: Java CI - CompteBancari

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descarregar JUnit 5
        run: |
          mkdir -p lib
          curl -L https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar -o lib/junit.jar

      - name: Compilar
        run: |
          mkdir -p out
          javac -cp lib/junit.jar -d out src/CompteBancari.java test/CompteBancariTest.java

      - name: Executar tests
        run: |
          java -cp "out:lib/junit.jar" org.junit.platform.console.ConsoleLauncher --scan-classpath